databases:
  - name: tamraparni-db
    databaseName: tamraparni_ayurveda
    user: tamraparni_user

services:
  - type: web
    name: tamraparni-ayurveda
    env: python
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --no-input && python manage.py migrate && python manage.py create_sample_data"
    startCommand: "gunicorn medshop.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: DATABASE_URL
        fromDatabase:
          name: tamraparni-db
          property: connectionString
